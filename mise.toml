[tools]
go = "1.26.1"
node = "22"       # VS Code extension: npm/tsc/vsce
java = "21"      # IntelliJ plugin: runs Gradle 8.13 wrapper + Kotlin 1.9.25

[tasks.build]
description = "Build the statusline binary for the current platform"
run = "go build -o claude-code-litellm-plugin ."

[tasks.install]
description = "Install the statusline binary via install.sh (downloads latest release + configures Claude)"
run = "bash install.sh"

# --- All plugins --------------------------------------------------------------

[tasks."build:all"]
description = "Build the statusline binary and both editor plugins"
depends = ["build", "vscode:build", "intellij:build"]

[tasks."install:all"]
description = "Install the statusline binary and both editor plugins"
depends = ["install", "vscode:install", "intellij:install"]

# --- VS Code ------------------------------------------------------------------

[tasks."vscode:build"]
description = "Compile TypeScript and package the VS Code extension into a .vsix"
dir = "{{config_root}}/vscode-extension"
run = "npm install && npm run compile && npm run package"

[tasks."vscode:install"]
description = "Install the built VS Code extension (.vsix) into code"
depends = ["vscode:build"]
run = "code --install-extension vscode-extension/claude-code-litellm-*.vsix --force"

# --- IntelliJ ----------------------------------------------------------------

[tasks."intellij:build"]
description = "Build the IntelliJ plugin zip via the Gradle wrapper"
dir = "{{config_root}}/intellij-plugin"
run = "./gradlew buildPlugin --console=plain"

[tasks."intellij:install"]
description = "Install the built IntelliJ plugin zip (open the file picker in IntelliJ)"
depends = ["intellij:build"]
run = "open intellij-plugin/build/distributions/claude-code-litellm-intellij-*.zip"

[tasks.fmt]
description = "Format Go source files"
run = "go fmt ./..."

[tasks.tidy]
description = "Tidy go.mod and go.sum"
run = "go mod tidy"

[tasks.test]
description = "Run tests (count=1 disables cache so examples.svg is always regenerated)"
run = "go test -v -count=1 ./..."

[tasks.lint]
description = "Run all linters (fmt, tidy, golangci-lint)"
depends = ["fmt", "tidy"]
run = "golangci-lint run"

[tasks."build:multi"]
description = "Build for all CI/CD release targets (linux/darwin/windows x amd64/arm64/386)"
run = """
set -e
GOOS_LIST="linux darwin windows"
GOARCH_LIST="amd64 arm64 386"
OUT=dist

rm -rf $OUT && mkdir -p $OUT

for OS in $GOOS_LIST; do
  for ARCH in $GOARCH_LIST; do
    # goreleaser skips darwin/386
    if [ "$OS" = "darwin" ] && [ "$ARCH" = "386" ]; then continue; fi

    EXT=""
    if [ "$OS" = "windows" ]; then EXT=".exe"; fi

    OUT_FILE="$OUT/claude-code-litellm-plugin_${OS}_${ARCH}${EXT}"
    echo "Building $OUT_FILE..."
    GOOS=$OS GOARCH=$ARCH CGO_ENABLED=0 go build -o "$OUT_FILE" .
  done
done

echo "Done. Binaries in $OUT/:"
ls $OUT/
"""
